{% extends 'base.html' %}
{% load static %}

{% block title %}Book Service{% endblock %}

{% block extra_css %}

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css">

<link rel="stylesheet"
      href="{% static 'css/booking-form.css' %}">

<style>

body{
    background:#f4f7fc;
}

.container{
    width:90%;
    max-width:800px;
    margin:40px auto;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.container h2{
    text-align:center;
    margin-bottom:30px;
    color:#0d2b5c;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
}

.form-group input,
.form-group textarea,
.form-group select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

.form-group textarea{
    resize:none;
}

button{
    width:100%;
    background:#0d2b5c;
    color:white;
    padding:14px;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#163d7a;
}

.select2-container{
    width:100% !important;
}

</style>

{% endblock %}

{% block content %}

<div class="container">

    <h2>
        Book {{ service|title }} Service
    </h2>

    <form method="POST">

        {% csrf_token %}

        <!-- Name -->
        <div class="form-group">

            <label>Name:</label>

            <input type="text"
                   name="name"
                   required>

        </div>

        <!-- Email -->
        <div class="form-group">

            <label>Email:</label>

            <input type="email"
                   name="email"
                   value="{{ request.session.user_email }}"
                   readonly>

        </div>

        <!-- Phone -->
        <div class="form-group">

            <label>Phone Number:</label>

            <input type="tel"
                   name="phone"
                   pattern="[0-9]{10}"
                   required>

        </div>

        <!-- Address -->
        <div class="form-group">

            <label>Address:</label>

            <textarea name="address"
                      rows="3"
                      required></textarea>

        </div>

        <!-- Pincode -->
        <div class="form-group">

            <label>Pincode:</label>

            <input type="text"
                   name="pincode"
                   maxlength="6"
                   required>

        </div>

        <!-- Preferred Date -->
        <div class="form-group">

            <label>Preferred Date:</label>

            <input type="date"
                   name="date"
                   required>

        </div>

        <!-- Requirements -->
        <div class="form-group">

            <label>Requirements:</label>

            <select id="requirements"
                    name="requirements"
                    multiple="multiple"
                    class="js-example-basic-multiple"
                    required>

                {% for item in requirements %}

                <option value="{{ item }}">
                    {{ item }}
                </option>

                {% endfor %}

            </select>

        </div>

        <!-- Description -->
        <div class="form-group">

            <label>Description:</label>

            <textarea name="description"
                      rows="4"
                      placeholder="Write additional details here..."></textarea>

        </div>

        <button type="submit">
            Submit Booking
        </button>

    </form>

</div>

<!-- jQuery -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<!-- Select2 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>

<script>

$(document).ready(function () {

    $('.js-example-basic-multiple').select2({

        placeholder: "Select Requirements"

    });

});

</script>

{% endblock %}
